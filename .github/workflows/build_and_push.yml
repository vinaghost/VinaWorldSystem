name: build_and_push

on:
  push:
    branches: [ main ]
    paths:
      - 'API/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      
    - name: Login to Local Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ secrets.REGISTRY_HOST }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
         
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build and push image
      uses: docker/build-push-action@v7
      with:
        platforms: linux/arm64
        file: ./API/Dockerfile
        context: .
        push: true
        tags: ${{ secrets.REGISTRY_HOST }}/webapi:latest
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/webapi:cache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/webapi:cache,mode=max,compression=zstd,oci-mediatypes=true,image-manifest=true
